services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: igg
      POSTGRES_PASSWORD: igg
      POSTGRES_DB: igg
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igg"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
