{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} – I Got Gas Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; color: #1d1d1f; }
  .nav { background: #1d1d1f; padding: 0 24px; display: flex; align-items: center; height: 52px; }
  .nav a { color: #f5f5f7; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .nav a:hover { background: rgba(255,255,255,0.1); }
  .nav a.active { background: #007AFF; }
  .nav .brand { font-weight: 700; font-size: 16px; margin-right: 24px; color: #fff; }
  .nav .spacer { flex: 1; }
  .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
  .card h2 { font-size: 20px; margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .stat { text-align: center; }
  .stat .num { font-size: 36px; font-weight: 700; color: #007AFF; }
  .stat .label { font-size: 13px; color: #86868b; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e5e7; font-weight: 600; color: #86868b; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f2; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #d4edda; color: #155724; }
  .badge-red { background: #f8d7da; color: #721c24; }
  .badge-gray { background: #e9ecef; color: #495057; }
  form.config-form label { display: block; font-weight: 600; margin-top: 16px; font-size: 14px; }
  form.config-form input[type="text"], form.config-form select, form.config-form textarea { width: 100%; padding: 10px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; margin-top: 4px; resize: vertical; }
  form.config-form .hint { font-size: 12px; color: #86868b; margin-top: 2px; }
  .btn { display: inline-block; background: #007AFF; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .btn:hover { background: #0051a8; }
  .btn-danger { background: #ff3b30; }
  .btn-danger:hover { background: #c0392b; }
  .btn-secondary { background: #86868b; }
  .flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .flash-success { background: #d4edda; color: #155724; }
  .flash-error { background: #f8d7da; color: #721c24; }
  .mono { font-family: "SF Mono", SFMono-Regular, Menlo, monospace; font-size: 12px; color: #86868b; }
</style>
</head>
<body>
<nav class="nav">
  <span class="brand">I Got Gas</span>
  <a href="/admin/" {{if eq .Nav "dashboard"}}class="active"{{end}}>Dashboard</a>
  <a href="/admin/users" {{if eq .Nav "users"}}class="active"{{end}}>Users</a>
  <a href="/admin/cars" {{if eq .Nav "cars"}}class="active"{{end}}>Cars</a>
  <a href="/admin/config" {{if eq .Nav "config"}}class="active"{{end}}>Config</a>
  <span class="spacer"></span>
  <form method="POST" action="/admin/logout" style="display:inline">
    <button type="submit" class="btn btn-secondary" style="padding:6px 16px; font-size:13px;">Logout</button>
  </form>
</nav>
<div class="container">
  {{template "content" .}}
</div>
</body>
</html>
{{end}}
