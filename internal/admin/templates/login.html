<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login – I Got Gas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 16px; padding: 48px 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #86868b; font-size: 14px; margin-bottom: 24px; }
  input[type="email"] { width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; margin-bottom: 16px; }
  .btn { display: block; width: 100%; background: #007AFF; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn:hover { background: #0051a8; }
  .flash { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .flash-success { background: #d4edda; color: #155724; }
  .flash-error { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<div class="card">
  <h1>Admin Login</h1>
  <p>I Got Gas Server</p>
  {{if .Flash}}
  <div class="flash {{.FlashClass}}">{{.Flash}}</div>
  {{end}}
  <form method="POST" action="/admin/login">
    <input type="email" name="email" placeholder="Admin email address" required autofocus>
    <button type="submit" class="btn">Send Login Link</button>
  </form>
</div>
</body>
</html>
